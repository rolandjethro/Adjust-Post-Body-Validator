<app-navbar 
  [version]="version()" 
  (openDictionary)="openDictionary()">
</app-navbar>

<div class="container-fluid px-4" ngSkipHydration>
  <div class="row g-4">
    <div class="col-12 col-lg-5">
      <app-query-input
        [hasDictionary]="hasDictionary()"
        [rawInput]="rawInput()"
        (rawInputChange)="rawInput.set($event)"
        (clearAll)="clearAll()"
        (process)="process()">
      </app-query-input>
    </div>

    <div class="col-12 col-lg-7">
      <app-inspector-results
        [hasDictionary]="hasDictionary()"
        [rawInput]="rawInput()"
        [jsonOutput]="jsonOutput()"
        [syntaxErrors]="syntaxErrors()"
        [validationResult]="validationResult()"
        [isRevenueEvent]="isRevenueEvent()"
        [matchedEventName]="matchedEventName()"
        [matchedEventToken]="matchedEventToken()"
        (openDictionary)="openDictionary()">
      </app-inspector-results>
    </div>
  </div>

  <div class="my-5">
    <app-history></app-history>
  </div>
</div>

<footer class="py-4 mt-5 border-top bg-body-tertiary">
  <div class="container-fluid px-4 text-center">
    <a href="https://daam.com.sa/" target="_blank" class="text-decoration-none d-flex align-items-center justify-content-center gap-2">
      <img src="assets/images/favicon.png" alt="Daam Logo" width="30" height="30">
      <span class="text-muted small fw-bold">Created by Daam Team &copy; {{currentYear}}</span>
    </a>
  </div>
</footer>
